name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar Android SDK Platform 35 y Build Tools
        run: |
          yes | sdkmanager --licenses
          sdkmanager --install "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Instalar dependencias npm
        run: npm ci

      - name: Build app web (Vite)
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Sincronizar Capacitor
        run: npx cap sync android

      - name: Dar permisos a Gradle
        run: chmod +x android/gradlew

      - name: Compilar APK Debug
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace --full-stacktrace

      - name: Subir APK descargable
        uses: actions/upload-artifact@v4
        with:
          name: Agrogestion-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
