name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # Permite lanzarlo manualmente con un click

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Build app web (Vite)
        run: npm run build

      - name: Sincronizar con Capacitor Android
        run: npx cap sync android

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Dar permisos a Gradle
        run: chmod +x android/gradlew

      - name: Compilar APK Debug
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Subir APK como artefacto descargable
        uses: actions/upload-artifact@v4
        with:
          name: Agrogestion-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
